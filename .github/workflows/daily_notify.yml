name: Daily Livehouse Notifier
on:
  schedule:
    # 毎日 日本時間 09:00 (UTC 00:00) 頃に届くように、混雑を避けて 08:45 (UTC 23:45) に実行開始
    - cron: '45 23 * * *'
  workflow_dispatch: # GitHubの画面から手動実行も可能にする設定
permissions:
  contents: write  # docs/index.html をコミット・プッシュするために必要
jobs:
  run-notifier:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium --with-deps
    - name: Run main script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main.py
    - name: Commit and push updated HTML
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/index.html
        git diff --cached --quiet || git commit -m "Update live schedule [$(date +'%Y-%m-%d')]"
        git push
