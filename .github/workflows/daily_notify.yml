name: Daily Livehouse Notifier
on:
  schedule:
    # GitHubの遅延を見越して、日本時間 06:00 (UTC 21:00) に登録（数時間遅れて9時頃に届くことを想定）
    - cron: '0 21 * * *'
  workflow_dispatch: # GitHubの画面から手動実行も可能にする設定
permissions:
  contents: write  # docs/index.html をコミット・プッシュするために必要
jobs:
  run-notifier:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium --with-deps
    - name: Run main script
      env:
        TZ: "Asia/Tokyo"  # 日本時間に固定（これがないと朝9時前に実行された時に昨日の日付になる）
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main.py
    - name: Commit and push updated HTML
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/index.html
        git diff --cached --quiet || git commit -m "Update live schedule [$(date +'%Y-%m-%d')]"
        git push
